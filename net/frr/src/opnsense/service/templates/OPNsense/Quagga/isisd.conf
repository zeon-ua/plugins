{# isisd.conf - IS-IS daemon configuration for FRR
   Included into frr.conf by the Quagga configd template system.
   Copyright (C) 2025 Your Name
#}
{% from 'OPNsense/Macros/interface.macro' import physical_interface %}
{%
   set isis_enabled = helpers.exists('OPNsense.quagga.isis.enabled')
                      and OPNsense.quagga.isis.enabled == '1'
%}
{% if isis_enabled %}
{# ------------------------------------------------------------------ #}
{# Interface stanzas — must come BEFORE router isis block in frr.conf  #}
{# ------------------------------------------------------------------ #}
{% if helpers.exists('OPNsense.quagga.isis.interfaces.interface') %}
{% for iface in helpers.sortDictList(OPNsense.quagga.isis.interfaces.interface, 'interface') %}
{% if iface.enabled == '1' %}
{% set phys = helpers.physical_interface(iface.interface) %}
interface {{ phys }}
{% if iface.passive == '1' %}
  isis passive
{% else %}
  ip router isis {{ OPNsense.quagga.isis.process_tag }}
{% if iface.circuit_type != '' %}
  isis circuit-type {{ iface.circuit_type }}
{% endif %}
{% if iface.metric != '' %}
  isis metric {{ iface.metric }}
{% endif %}
{% if iface.hello_interval != '' %}
  isis hello-interval {{ iface.hello_interval }}
{% endif %}
{% if iface.hello_multiplier != '' %}
  isis hello-multiplier {{ iface.hello_multiplier }}
{% endif %}
{% if iface.network_type != '' %}
  isis network {{ iface.network_type }}
{% endif %}
{% if iface.auth_mode != '' and iface.auth_password != '' %}
{% if iface.auth_mode == 'md5' %}
  isis authentication mode md5
  isis authentication key-chain {{ iface.auth_password }}
{% else %}
  isis authentication mode clear
  isis authentication key-chain {{ iface.auth_password }}
{% endif %}
{% endif %}
{% endif %}
!
{% endif %}
{% endfor %}
{% endif %}
{# ------------------------------------------------------------------ #}
{# router isis block                                                    #}
{# ------------------------------------------------------------------ #}
router isis {{ OPNsense.quagga.isis.process_tag }}
{% if helpers.exists('OPNsense.quagga.isis.net') and OPNsense.quagga.isis.net != '' %}
  net {{ OPNsense.quagga.isis.net }}
{% endif %}
{% if helpers.exists('OPNsense.quagga.isis.is_type') and OPNsense.quagga.isis.is_type != '' %}
  is-type {{ OPNsense.quagga.isis.is_type }}
{% endif %}
{% if helpers.exists('OPNsense.quagga.isis.metric_style') and OPNsense.quagga.isis.metric_style != '' %}
  metric-style {{ OPNsense.quagga.isis.metric_style }}
{% endif %}
{% if helpers.exists('OPNsense.quagga.isis.log_adj_changes') and OPNsense.quagga.isis.log_adj_changes == '1' %}
  log-adjacency-changes
{% endif %}
{% if helpers.exists('OPNsense.quagga.isis.purge_originator') and OPNsense.quagga.isis.purge_originator == '1' %}
  purge-originator
{% endif %}
{% if helpers.exists('OPNsense.quagga.isis.spf_delay') and OPNsense.quagga.isis.spf_delay != '' %}
  spf-delay-ietf init {{ OPNsense.quagga.isis.spf_delay }} short {{ OPNsense.quagga.isis.spf_delay }} long {{ OPNsense.quagga.isis.spf_delay }}
{% endif %}
{# Domain authentication #}
{% if helpers.exists('OPNsense.quagga.isis.auth_mode') and OPNsense.quagga.isis.auth_mode != ''
   and helpers.exists('OPNsense.quagga.isis.auth_password') and OPNsense.quagga.isis.auth_password != '' %}
{% if OPNsense.quagga.isis.auth_mode == 'md5' %}
  area-password md5 {{ OPNsense.quagga.isis.auth_password }}
  domain-password md5 {{ OPNsense.quagga.isis.auth_password }}
{% else %}
  area-password clear {{ OPNsense.quagga.isis.auth_password }}
  domain-password clear {{ OPNsense.quagga.isis.auth_password }}
{% endif %}
{% endif %}
{# Redistributions #}
{% if helpers.exists('OPNsense.quagga.isis.redistributions.redistribution') %}
{% for redist in helpers.sortDictList(OPNsense.quagga.isis.redistributions.redistribution, 'protocol') %}
{% if redist.enabled == '1' %}
  redistribute ipv4 {{ redist.protocol }} {{ redist.level }}{% if redist.metric != '' %} metric {{ redist.metric }}{% endif %}{% if redist.route_map != '' %} route-map {{ redist.route_map }}{% endif +%}
{% endif %}
{% endfor %}
{% endif %}
!
{% endif %}
